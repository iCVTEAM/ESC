random_seed: 42
task_name: ESC-DERS_XS
ckpt:
  ckpt_base_path: ./ckpt
logger:
  logging_path: ./logs
dataset:
  dataset: DERS_XS
  data_path: ./data/DERS_XS
  width: 640
  height: 360
  num_classes: 11
  label_convert: LabelConvert_Carla11
model:
  arch: ESC
  backbone: mit_b2
  pretrained_weights: ./pretrained/mit_b2.pth
  vqvae_weights: ./pretrained/vqvae_ders.pth.tar
  criterion: LossForESC
  loss_weight: [1, 0.1]
  num_embeddings: 128
  scheduler: Cyclic01
train:
  partition: Train
  data_inputs: [RGB/XTRM, DVS/BIN5, SEG/RAW]
  data_keys: [RGB, DVS, SEG]
  dummy: [False, False, False]
  batch_size: 16
  num_workers: 16
  num_epochs: 300
  learning_rate: 6.e-5
  freeze_bn: True
  crop_size: 256
val:
  partition: Valid
  data_inputs: [RGB/XTRM, DVS/BIN5, SEG/RAW]
  data_keys: [RGB, DVS, SEG]
  dummy: [False, False, False]
  batch_size: 8
  num_workers: 8
  size: [360, 640]
test:
  partition: Test
  data_inputs: [RGB/XTRM, DVS/BIN5, SEG/RAW]
  data_keys: [RGB, DVS, SEG]
  dummy: [False, False, False]
  batch_size: 8
  num_workers: 8
  size: [360, 640]
  # visualization_outputs: ./outputs